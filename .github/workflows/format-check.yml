name: Format Check

on:
  push:
    branches:
      - main
      - develop
    paths:
      - '**.ts'
      - '**.tsx'
      - '**.js'
      - '**.jsx'
      - '**.json'
      - '**.md'
      - '**/.prettierrc'
      - '**/prettier.config.*'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'packages/*/package.json'
      - '.github/workflows/format-check.yml'
  pull_request:
    paths:
      - '**.ts'
      - '**.tsx'
      - '**.js'
      - '**.jsx'
      - '**.json'
      - '**.md'
      - '**/.prettierrc'
      - '**/prettier.config.*'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'packages/*/package.json'
      - '.github/workflows/format-check.yml'

defaults:
  run:
    shell: 'bash'

jobs:
  format-check:
    name: Prettier Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run format check
        run: pnpm run format:check
